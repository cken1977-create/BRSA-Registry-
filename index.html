<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BRSA Registry — Public Verification</title>
<meta name="description" content="Official Public Registry of the Behavioral Readiness Standards Authority." />

<link rel="stylesheet" href="assets/styles.css" />
</head>

<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="wordmark">BRSA Registry</div>
  </div>
</nav>

<main class="main">
  <section class="hero">
    <h1>Public Readiness Registry</h1>
    <p class="subtext">
      Verify readiness standing using an official BRSA Registry ID.
    </p>
  </section>

  <section class="lookup-section">
    <input
      class="lookup-input"
      placeholder="BRSA-YY-XXXXXXXX"
      autocomplete="off"
    />
    <button class="lookup-btn">Verify Readiness</button>

    <div class="lookup-result hidden">
      <div class="state-line">
        <span class="state-dot"></span>
        <span class="state-text"></span>
      </div>
      <div class="meta"></div>
    </div>
  </section>
</main>

<footer class="footer">
  Behavioral Readiness Standards Authority — Official Public Registry
</footer>

<script src="assets/app.js"></script>
</body>
</html>
